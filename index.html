<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photo Form</title>
</head>
<body>

<h2>Photo Form</h2>

<input id="fieldId" placeholder="ID"><br><br>
<input id="fieldName" placeholder="Name"><br><br>
<input id="fieldMobile" placeholder="Mobile"><br><br>

<input type="file" id="p0" accept="image/*"><br><br>
<input type="file" id="p1" accept="image/*"><br><br>
<input type="file" id="p2" accept="image/*"><br><br>
<input type="file" id="p3" accept="image/*"><br><br>

<button onclick="submitForm()">Submit</button>

<script>
const APPS_SCRIPT_URL = "PASTE_YOUR_WEB_APP_URL_HERE";

async function blobToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

async function submitForm() {
  const id = document.getElementById('fieldId').value;
  const name = document.getElementById('fieldName').value;
  const mobile = document.getElementById('fieldMobile').value;

  const inputs = [
    document.getElementById('p0').files[0],
    document.getElementById('p1').files[0],
    document.getElementById('p2').files[0],
    document.getElementById('p3').files[0]
  ];

  if (inputs.some(p => !p)) {
    alert("All 4 photos required");
    return;
  }

  const baseData = {
    id, name, mobile,
    timestamp: new Date().toISOString()
  };

  const urls = [];

  // 🔥 upload one by one
  for (let i = 0; i < inputs.length; i++) {
    const base64 = await blobToBase64(inputs[i]);

    const fd = new FormData();
    fd.append("id", id);
    fd.append("name", name);
    fd.append("mobile", mobile);
    fd.append("timestamp", baseData.timestamp);

    fd.append("photoIndex", i+1);
    fd.append("photoData", base64);

    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: fd
    });

    const data = await res.json();
    urls.push(data.url);
  }

  // 🔥 final save
  const final = new FormData();
  final.append("final", "true");

  final.append("id", id);
  final.append("name", name);
  final.append("mobile", mobile);
  final.append("timestamp", baseData.timestamp);

  urls.forEach((u,i)=> final.append("photo"+(i+1), u));

  await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: final
  });

  alert("SUCCESS ✅");
}
</script>

</body>
</html>
