<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Field Documentation — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.08);
    --border-focus: rgba(255,255,255,0.25);
    --text: #f0efe8;
    --text-soft: rgba(240,239,232,0.5);
    --text-muted: rgba(240,239,232,0.3);
    --accent: #d4a843;
    --accent-dim: rgba(212,168,67,0.12);
    --danger: #e05555;
    --danger-dim: rgba(224,85,85,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
 
  html, body { height: 100%; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
 
  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
 
  /* Glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 500px;
    background: radial-gradient(ellipse, rgba(212,168,67,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
 
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
 
  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  /* Top badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
 
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 28px;
    line-height: 1.5;
  }
 
  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }
 
  /* Fields */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
 
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.2s;
  }
 
  .field input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: var(--text-muted); }
  .field input:focus {
    border-color: var(--border-focus);
    background: rgba(255,255,255,0.04);
  }
  .field input:focus ~ .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--text-soft); }
  .field input.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
 
  /* Error */
  .error-msg {
    display: none;
    font-size: 11px;
    color: var(--danger);
    margin-top: 6px;
    padding: 8px 10px;
    background: var(--danger-dim);
    border-radius: 6px;
    border-left: 2px solid var(--danger);
  }
  .error-msg.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
 
  /* Login button */
  .login-btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
 
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0d0f;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
 
  .footer-note {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
  }
 
  /* Show/hide password toggle */
  .eye-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text-muted);
    padding: 4px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--text-soft); }
</style>
</head>
<body>
 
<div class="card">
  <div class="badge"><span class="badge-dot"></span> Secure Access</div>
  <h1>Field Documentation</h1>
  <p class="subtitle">Sign in to access the photo submission portal. Contact your admin if you don't have credentials.</p>
  <div class="divider"></div>
 
  <form onsubmit="handleLogin(event)" autocomplete="off">
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" spellcheck="false">
        <span class="input-icon">👤</span>
      </div>
    </div>
 
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="input-icon">🔒</span>
        <button type="button" class="eye-btn" onclick="togglePwd()" id="eyeBtn">👁</button>
      </div>
    </div>
 
    <div class="error-msg" id="errorMsg">Incorrect username or password. Please try again.</div>
 
    <button type="submit" class="login-btn" id="loginBtn">
      <span id="btnLabel">Sign In</span>
    </button>
  </form>
 
  <p class="footer-note">Access is restricted to authorised personnel only.</p>
</div>
 
<script>
// ─────────────────────────────────────────────────────────────────
// USER CREDENTIALS — Add / remove users here
// Format: 'username': 'password'
// ─────────────────────────────────────────────────────────────────
const USERS = {
  'admin':   'admin123',
  'user1':   'pass001',
  'user2':   'pass002',
  'user3':   'pass003',
  'agent01': 'field@01',
  'agent02': 'field@02',
};
// ─────────────────────────────────────────────────────────────────
 
// If already logged in, skip to form
if (sessionStorage.getItem('loggedIn') === 'true') {
  window.location.href = 'form.html';
}
 
function togglePwd() {
  const input = document.getElementById('password');
  const btn   = document.getElementById('eyeBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}
 
function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  const btnLabel = document.getElementById('btnLabel');
 
  errorMsg.classList.remove('show');
 
  if (!username || !password) {
    errorMsg.textContent = 'Please enter both username and password.';
    errorMsg.classList.add('show');
    return;
  }
 
  // Show loading state
  loginBtn.disabled = true;
  btnLabel.innerHTML = '';
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  loginBtn.prepend(spinner);
 
  // Simulate brief auth check
  setTimeout(() => {
    const validPassword = USERS[username.toLowerCase()];
 
    if (validPassword && validPassword === password) {
      // Save session
      sessionStorage.setItem('loggedIn', 'true');
      sessionStorage.setItem('username', username.toLowerCase());
      window.location.href = 'form.html';
    } else {
      loginBtn.disabled = false;
      spinner.remove();
      btnLabel.textContent = 'Sign In';
      errorMsg.textContent = 'Incorrect username or password. Please try again.';
      errorMsg.classList.add('show');
      // Shake inputs
      document.getElementById('username').classList.add('shake');
      document.getElementById('password').classList.add('shake');
      document.getElementById('password').value = '';
      setTimeout(() => {
        document.getElementById('username').classList.remove('shake');
        document.getElementById('password').classList.remove('shake');
      }, 400);
    }
  }, 700);
}
</script>
</body>
</html>
